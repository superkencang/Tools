<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL ↔ Base64Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }

    h2 {
      color: #333;
    }

    textarea, input {
      width: 90%;
      max-width: 500px;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      margin-right: 5px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .box {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
      width: 90%;
      max-width: 550px;
    }

    .label {
      font-weight: bold;
      margin-top: 5px;
      display: block;
    }
  </style>
</head>
<body>
  <h2>🔐 URL ↔ Base64 Converter</h2>

  <!-- URL → Base64 -->
  <div class="box">
    <span class="label">URL ke Base64</span>
    <input type="text" id="urlInput" placeholder="Masukkan URL (mis. https://google.com)">
    <button onclick="encodeURL()">URL → Base64</button>
    <textarea id="outputB64" readonly placeholder="Hasil Base64 akan muncul di sini"></textarea>
  </div>

  <!-- Base64 → URL -->
  <div class="box">
    <span class="label">Base64 ke URL</span>
    <textarea id="b64Input" placeholder="Masukkan string Base64 di sini"></textarea>
    <button onclick="decodeURL()">Base64 → URL</button>
    <input type="text" id="outputURL" readonly placeholder="Hasil URL akan muncul di sini">
  </div>

  <script>
    // URL → Base64
    function encodeURL() {
      const url = document.getElementById("urlInput").value;
      if (url.trim() === "") {
        alert("Please enter a valid URL.");
        return;
      }

      try {
        const encoded = btoa(url);
        document.getElementById("outputB64").value = encoded;
      } catch (error) {
        alert("Error encoding URL: " + error.message);
      }
    }

    // Base64 → URL
    function decodeURL() {
      const b64 = document.getElementById("b64Input").value;
      if (b64.trim() === "") {
        alert("Please enter a Base64 string.");
        return;
      }

      try {
        const decoded = atob(b64);
        document.getElementById("outputURL").value = decoded;
      } catch (error) {
        alert("Error decoding Base64: " + error.message);
      }
    }
  </script>
</body>
</html>
