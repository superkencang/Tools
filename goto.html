<!doctype html>
<meta charset="utf-8" />
<title>PHP Obfuscation ↔ Deobfuscation (Compact GOTO - FIXED)</title>
<style>
  body{font:14px/1.4 system-ui,Segoe UI,Arial;margin:16px}
  textarea{width:100%;height:260px;border:1px solid #ccc;border-radius:8px;padding:10px;font-family:monospace;font-size:13px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  button{padding:8px 14px;margin:8px 8px 0 0}
  .goto-info{background:#f0f0f0;padding:10px;border-radius:6px;margin:10px 0;font-size:12px}
</style>

<div class="goto-info">
  <strong>🔥 COMPACT GOTO Version - FIXED:</strong> Kode padat dengan semua GOTO di samping (horizontal) - SUDAH BISA JALAN
</div>

<div class="row">
  <div>
    <h3>Kode Obfuscated (input)</h3>
    <textarea id="inp" placeholder='$z = "";
$z .= "WlhK";
$z .= "eWIz";
...'></textarea>
    <button id="btnDecode">Obfuscated → PHP biasa</button>
    <button id="btnClearIn">Bersihkan Input</button>
  </div>
  <div>
    <h3>Hasil Decode (PHP biasa)</h3>
    <textarea id="out" placeholder="Hasil PHP muncul di sini..."></textarea>
    <button id="btnEncode">PHP biasa → Obfuscated (Compact GOTO)</button>
    <button id="btnClearOut">Bersihkan Output</button>
  </div>
</div>

<script>
/* ==== util UTF-8 safe base64 ==== */
const b64enc = (str) => {
  const bytes = new TextEncoder().encode(str);
  let bin = ""; bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
};
const b64dec = (b64) => {
  const bin = atob(b64);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
};
/* pad + urlsafe fix + strict charset */
function cleanB64(s){
  s = (s||"").replace(/[^A-Za-z0-9+/=_-]/g,"").replace(/-/g,"+").replace(/_/g,"/");
  while (s.length % 4 !== 0) s += "=";
  return s;
}
/* ambil hanya baris `$var .= "....";` */
function collectFragments(src){
  const re = /(^|\n)\s*\$[A-Za-z_]\w*\s*\.\=\s*["']([^"']+)["']\s*;/g;
  let m, parts = [];
  while ((m = re.exec(src)) !== null) {
    const frag = cleanB64(m[2]);
    if (frag) parts.push(frag);
  }
  return parts.join("");
}
/* coba double decode, lalu fallback single */
function decodeSmart(b64joined){
  const j = cleanB64(b64joined);
  let first;
  try { first = b64dec(j); } 
  catch(e){ throw new Error("Decode pertama gagal (data bukan base64 murni)."); }
  try { return b64dec(cleanB64(first)); } 
  catch(e){ return first; } // hanya single layer
}

const $ = (id)=>document.getElementById(id);

$("btnDecode").onclick = () => {
  const src = $("inp").value;
  if(!src.trim()){ alert("Input kosong"); return; }
  const joined = collectFragments(src);
  if(!joined){ alert('Tidak menemukan baris `$x .= "....";`'); return; }
  try {
    let decoded = decodeSmart(joined);
    decoded = decoded.replace(/^\s*<\?php\s*/i,'').replace(/\s*\?>\s*$/,'');
    $("out").value = decoded;
  } catch (e){
    alert("Base64 decode gagal: " + e.message);
  }
};

$("btnEncode").onclick = () => {
  const php = $("out").value || "";
  const body = php.replace(/^\s*<\?php\s*/i,'').replace(/\s*\?>\s*$/,'');
  const twice = b64enc(b64enc(body));
  const CHUNK = 4;
  
  let chunks = [];
  for (let i = 0; i < twice.length; i += CHUNK) {
    chunks.push(twice.slice(i, i+CHUNK));
  }
  
  // Buat kode GOTO yang PADAT dan BISA JALAN
  let lines = ['<?php'];
  
  // Mulai dengan goto ke label start
  lines.push('goto start;');
  
  // Label start dan inisialisasi
  let chunkLines = [];
  
  // Baris pertama: start label + inisialisasi $z
  if (chunks.length > 0) {
    chunkLines.push(`start:$z="";${chunks.length > 1 ? 'goto c1;' : 'goto d1;'}`);
  }
  
  // Chunk-chunk berikutnya
  for (let i = 0; i < chunks.length; i++) {
    if (i === 0) continue; // skip yang pertama karena sudah di start
    
    const label = `c${i}`;
    const nextLabel = i < chunks.length - 1 ? `c${i+1}` : 'd1';
    chunkLines.push(`${label}:$z.="${chunks[i]}";goto ${nextLabel};`);
  }
  
  // Proses decode
  const processLines = [
    'd1:$a="base";goto d2;',
    'd2:$b="64_decode";goto d3;',
    'd3:$c=$a.$b;goto p1;',
    'p1:$string=$c($z);goto p2;',
    'p2:$string=$c($string);goto cl1;',
    'cl1:$p1="/^<\\?php\\s*/";goto cl2;',
    'cl2:$string=preg_replace($p1,"",$string);goto cl3;',
    'cl3:$p2="/\\s*\\?>$/";goto cl4;',
    'cl4:$string=preg_replace($p2,"",$string);goto ev;',
    'ev:eval($string);goto end;',
    'end:?>'
  ];
  
  // Gabungkan semua
  let allLines = [];
  allLines.push('<?php');
  allLines.push('goto start;');
  
  // Tambahkan start + chunk pertama
  if (chunks.length > 0) {
    allLines.push(`start:$z="";${chunks.length > 1 ? 'goto c1;' : 'goto d1;'}`);
  }
  
  // Tambahkan chunk sisanya
  for (let i = 1; i < chunks.length; i++) {
    const nextLabel = i < chunks.length - 1 ? `c${i+1}` : 'd1';
    allLines.push(`c${i}:$z.="${chunks[i]}";goto ${nextLabel};`);
  }
  
  // Tambahkan proses decode
  for (let line of processLines) {
    allLines.push(line);
  }
  
  // Filter yang kosong
  allLines = allLines.filter(line => line.trim() !== '');
  
  $("inp").value = allLines.join("\n");
};

$("btnClearIn").onclick = ()=> $("inp").value = "";
$("btnClearOut").onclick = ()=> $("out").value = "";
</script>
